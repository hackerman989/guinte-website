  /* ---- Render the grid (no need to touch below this line) ---- */
   const grid = document.getElementById("grid");

  if (artworks.length === 0) {
    grid.innerHTML = '<p class="empty-note">Works coming soon.</p>';
  } else {
    artworks.forEach((art, i) => {
      const tile = document.createElement("a");
      tile.className = "tile";
      tile.href = "#";
      tile.style.animationDelay = (0.04 * i) + "s";

      const meta = [art.medium, art.year].filter(Boolean).join(" · ");
      tile.innerHTML = `
        <img src="${art.src}" alt="${art.title || ""}" />
        <div class="cap">
          <div>${art.title || ""}</div>
          ${meta ? `<div class="meta">${meta}</div>` : ""}
        </div>`;

      tile.addEventListener("click", (e) => { e.preventDefault(); openLightbox(art); });
      grid.appendChild(tile);

      const img = tile.querySelector("img");
      img.addEventListener("load",  () => { tile._ratio = (img.naturalWidth || 3) / (img.naturalHeight || 4); scheduleLayout(); });
      img.addEventListener("error", () => { tile._ratio = 1; scheduleLayout(); });
    });
  }

  /* ---- justified rows: fill left-to-right, then wrap (whole image, no crop) ---- */
  const ROW_HEIGHT_DESKTOP = 380;   // bigger = larger images, fewer per row
  const ROW_HEIGHT_MOBILE  = 210;

  let layoutPending = false;
  function scheduleLayout() {
    if (layoutPending) return;
    layoutPending = true;
    requestAnimationFrame(() => { layoutPending = false; layoutGrid(); });
  }

  function layoutGrid() {
    const tiles = Array.from(grid.querySelectorAll(".tile"));
    if (!tiles.length) return;
    const cs = getComputedStyle(grid);
    const gap = parseFloat(cs.columnGap || cs.gap) || 12;
    const W = grid.clientWidth;
    const target = W < 600 ? ROW_HEIGHT_MOBILE : ROW_HEIGHT_DESKTOP;

    let row = [], ratioSum = 0;
    const flush = (isLast) => {
      if (!row.length) return;
      const totalGap = gap * (row.length - 1);
      let h = (W - totalGap) / ratioSum;
      if (isLast) h = Math.min(h, target * 1.3);   // keep a lonely last row from ballooning
      row.forEach((t) => {
        const r = t._ratio || 0.75;
        t.style.width  = (r * h) + "px";
        t.style.height = h + "px";
      });
      row = []; ratioSum = 0;
    };
    tiles.forEach((t) => {
      const r = t._ratio || 0.75;
      row.push(t); ratioSum += r;
      if (ratioSum * target + gap * (row.length - 1) >= W) flush(false);
    });
    flush(true);
  }

  window.addEventListener("load", layoutGrid);
  let resizeTimer;
  window.addEventListener("resize", () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(layoutGrid, 120); });

  /* ---- Lightbox ---- */
  const lb     = document.getElementById("lightbox");
  const lbImg  = document.getElementById("lb-img");
  const lbCap  = document.getElementById("lb-cap");

  function openLightbox(art) {
    lbImg.src = art.src;
    lbImg.alt = art.title || "";
    const meta = [art.title, art.medium, art.year].filter(Boolean).join("  ·  ");
    lbCap.textContent = meta;
    lb.classList.add("open");
  }
  function closeLightbox() {
    lb.classList.remove("open");
    lbImg.src = "";
  }
  lb.addEventListener("click", closeLightbox);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeLightbox();
  });
  </script>
